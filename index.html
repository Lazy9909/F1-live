<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="F1 Live Updates"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>F1 Live Updates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --red:#e10600;--red-dim:#7a0300;--gold:#f5a623;--silver:#c0c0c0;--bronze:#cd7f32;
      --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;--text:#f0f0f0;
      --muted:#666;--green:#00d27f;--purple:#9b59b6;--orange:#ff8c00;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* SPLASH SCREEN */
    #splash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease-out;}
    #splash.hidden{opacity:0;pointer-events:none;}
    .splash-content{text-align:center;max-width:300px;}
    .splash-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:30px;}
    .splash-logo span{color:var(--text);}
    .loader{width:60px;height:60px;margin:0 auto 30px;position:relative;}
    .loader svg{width:100%;height:100%;animation:rotate 2s linear infinite;}
    @keyframes rotate{100%{transform:rotate(360deg);}}
    .loader circle{stroke:var(--red);stroke-width:3;fill:none;stroke-dasharray:94;stroke-dashoffset:0;animation:dash 1.5s ease-in-out infinite;}
    @keyframes dash{0%{stroke-dashoffset:94;}50%{stroke-dashoffset:47;}100%{stroke-dashoffset:94;}}
    .splash-status{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;height:32px;display:flex;flex-direction:column;justify-content:center;}
    .status-item{font-size:11px;margin:4px 0;display:flex;align-items:center;gap:6px;}
    .status-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:10px;}
    .status-icon.done{color:var(--green);}
    .status-icon.pending{color:var(--muted);}
    .status-icon.loading{animation:spin .8s linear infinite;}
    @keyframes spin{100%{transform:rotate(360deg);}}
    .splash-progress{width:100%;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:20px;}
    .splash-progress-fill{height:100%;background:var(--red);width:0%;transition:width .3s ease;}

    header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:2px solid var(--red);padding:0 16px;}
    .hdr{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;}
    .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1.5px;color:var(--red);text-transform:uppercase;}
    .logo span{color:var(--text);}
    .livebadge{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;color:var(--green);}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite;}
    .dot.off{background:var(--muted);animation:none;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}

    #stale-bar{display:none;background:rgba(255,140,0,.1);border-bottom:1px solid rgba(255,140,0,.2);padding:4px 16px;font-size:10px;color:var(--orange);letter-spacing:.5px;text-align:center;cursor:pointer;}
    #stale-bar.show{display:block;}

    #ptr{position:fixed;top:0;left:0;right:0;z-index:500;height:0;overflow:hidden;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:height .15s ease;}
    .ptr-inner{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
    #ptr.ready .ptr-inner{color:var(--green);}
    #ptr-icon{transition:transform .25s ease;}
    #ptr.ready #ptr-icon{transform:rotate(180deg);}

    #raceinfo{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;}
    .ri{max-width:640px;margin:0 auto;}
    .rname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:1px;}
    .rmeta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:10px;}

    #lapbar{background:linear-gradient(90deg,var(--red-dim),transparent);border-bottom:1px solid var(--border);padding:7px 16px;display:none;}
    .lbi{max-width:640px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
    .lapnum{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;}
    .laplbl{font-size:10px;color:var(--muted);text-transform:uppercase;}
    .lapprog{flex:1;margin:0 14px;}
    .lpbg{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
    .lpfill{height:100%;background:var(--red);border-radius:2px;transition:width .6s ease;}

    .tabwrap{background:var(--surface);border-bottom:1px solid var(--border);}
    .tabs{display:flex;max-width:640px;margin:0 auto;}
    .tab{flex:1;padding:10px 2px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .tab.on{color:var(--text);border-bottom-color:var(--red);}
    .subtabwrap{background:var(--surface2);border-bottom:1px solid var(--border);}
    .subtabs{display:flex;max-width:640px;margin:0 auto;padding:0 12px;gap:2px;}
    .subtab{padding:7px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .subtab.on{color:var(--text);border-bottom-color:var(--gold);}

    main{max-width:640px;margin:0 auto;padding:0 0 80px;}
    .pane{display:none;}.pane.on{display:block;}
    .subpane{display:none;}.subpane.on{display:block;}

    /* Driver cards */
    .dlist{padding:8px 12px;display:flex;flex-direction:column;gap:5px;}
    .dcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:grid;grid-template-columns:34px 4px 1fr auto;align-items:center;gap:10px;padding:9px 11px;position:relative;overflow:hidden;transition:opacity .3s;}
    .dcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
    .dcard.p1::before{background:var(--gold);}
    .dcard.p2::before{background:var(--silver);}
    .dcard.p3::before{background:var(--bronze);}
    .dcard.fl::before{background:var(--purple);}
    .dcard.dnf{opacity:.4;}
    .posn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--muted);text-align:center;line-height:1;}
    .dcard.p1 .posn{color:var(--gold);}
    .dcard.p2 .posn{color:var(--silver);}
    .dcard.p3 .posn{color:var(--bronze);}
    .tcbar{width:4px;height:34px;border-radius:2px;flex-shrink:0;}
    .dinfo{min-width:0;}
    .dname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .dteam{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
    .dextra{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
    .dright{text-align:right;flex-shrink:0;}
    .gap{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;display:block;}
    .gap.ldr{color:var(--green);font-size:11px;}
    .llap{font-size:10px;color:var(--muted);margin-top:2px;display:block;}
    .llap.fl{color:var(--purple);font-weight:600;}
    .tyre{width:20px;height:20px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;flex-shrink:0;}
    .tyre.soft{border-color:#e10600;color:#e10600;}
    .tyre.medium{border-color:#ffd600;color:#ffd600;}
    .tyre.hard{border-color:#f0f0f0;color:#f0f0f0;}
    .tyre.inter{border-color:#00d27f;color:#00d27f;}
    .tyre.wet{border-color:#1e90ff;color:#1e90ff;}
    .pit-badge{background:rgba(255,140,0,.2);color:#ff8c00;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:1px;}
    .dnf-badge{background:rgba(100,100,100,.2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:1px;}

    /* Calendar */
    .calendar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 12px;}
    .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:default;position:relative;overflow:hidden;}
    .cal-card::before{position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);}
    .cal-date{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;color:var(--text);letter-spacing:.5px;}
    .cal-title{font-size:11px;color:var(--muted);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cal-status{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}

    /* Modal */
    #drv-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:16px;}
    #drv-modal.open{display:flex;}
    #drv-card{background:var(--surface);border-radius:8px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}

    /* FAB */
    #fab{position:fixed;bottom:20px;right:20px;z-index:80;width:50px;height:50px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(225,6,0,.3);transition:transform .3s;}
    #fab:active{transform:scale(.95);}
    #fab.spin{animation:fabspin .8s linear infinite;}
    @keyframes fabspin{100%{transform:rotate(360deg);}}

    .smsg{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;}
    .smsg .ico{font-size:48px;margin-bottom:16px;}
    .smsg h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px;text-transform:uppercase;}
    .smsg p{font-size:13px;color:var(--muted);line-height:1.5;}
  </style>
</head>
<body>

<!-- Driver Drilldown Modal -->

  <div id="drv-card"></div>

<!-- FAB -->

<script>
const API_BASE='https://api.openf1.org/v1';
const CACHE_VERSION='f1_v2';
const CACHE_TTL=300000; // 5 min
const RATE_LIMIT_DELAY=50; // ms between requests

let _db, _curTick, _tickTimer, _lastStaleWarn=0;

const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

// ═══ SPLASH & STATUS ═══════════════════════════════════════════
class SplashManager {
  constructor() {
    this.steps = [
      { id: 'season', label: 'Loading season...' },
      { id: 'races', label: 'Loading races...' },
      { id: 'session', label: 'Fetching session...' },
      { id: 'drivers', label: 'Loading drivers...' },
      { id: 'standings', label: 'Computing standings...' }
    ];
    this.complete = new Set();
  }
  
  update(stepId) {
    this.complete.add(stepId);
    this.render();
  }
  
  render() {
    const status = $('splash-status');
    const progress = (this.complete.size / this.steps.length) * 100;
    
    status.innerHTML = this.steps.map(s => `
      <div class="status-item">
        <div class="status-icon ${this.complete.has(s.id) ? 'done' : this.isLoading(s.id) ? 'loading' : 'pending'}">
          ${this.complete.has(s.id) ? '✓' : this.isLoading(s.id) ? '⟳' : '○'}
        </div>
        <span>${s.label}</span>
      </div>
    `).join('');
    
    $('splash-progress').style.width = progress + '%';
  }
  
  isLoading(stepId) {
    const idx = this.steps.findIndex(s => s.id === stepId);
    const lastIdx = Array.from(this.complete).map(id => this.steps.findIndex(s => s.id === id)).pop() ?? -1;
    return idx === lastIdx + 1;
  }
  
  hide() {
    setTimeout(() => {
      $('splash').classList.add('hidden');
    }, 300);
  }
}

const splash = new SplashManager();

// ═══ INDEXEDDB CACHE ═══════════════════════════════════════════
async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('F1LiveCache', 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('cache')) {
        db.createObjectStore('cache', { keyPath: 'key' });
      }
    };
  });
}

async function getCached(key) {
  return new Promise((resolve) => {
    const tx = _db.transaction('cache', 'readonly');
    const store = tx.objectStore('cache');
    const req = store.get(key);
    req.onsuccess = () => {
      const item = req.result;
      if (item && Date.now() - item.ts < CACHE_TTL) {
        resolve(item.data);
      } else {
        resolve(null);
      }
    };
    req.onerror = () => resolve(null);
  });
}

async function setCached(key, data) {
  return new Promise((resolve) => {
    const tx = _db.transaction('cache', 'readwrite');
    const store = tx.objectStore('cache');
    store.put({ key, data, ts: Date.now() });
    tx.oncomplete = () => resolve();
  });
}

// ═══ API FETCH WITH RETRY & RATE LIMIT ════════════════════════
async function fetchAPI(path) {
  const cacheKey = `api_${path}`;
  const cached = await getCached(cacheKey);
  if (cached) return cached;
  
  try {
    await new Promise(r => setTimeout(r, RATE_LIMIT_DELAY));
    const resp = await fetch(API_BASE + path, { headers: { 'Accept-Encoding': 'gzip' } });
    if (resp.status === 429) throw new Error('Rate limited');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    await setCached(cacheKey, data);
    return data;
  } catch (e) {
    console.error(`Fetch failed: ${path}`, e);
    return cached || [];
  }
}

// ═══ BOOT: FETCH ALL DATA UPFRONT ═════════════════════════════
async function bootLoad() {
  splash.render();
  
  try {
    // 1. Season
    const season = new Date().getFullYear();
    splash.update('season');
    
    // 2. Races
    const races = await fetchAPI(`/races?year=${season}`);
    splash.update('races');
    
    // 3. Current/Latest session
    const latestRace = races[races.length - 1];
    let sessionData = { positions: [], drivers: [], races: [] };
    
    if (latestRace) {
      const sessions = await fetchAPI(`/sessions?year=${season}&round=${latestRace.round}`);
      const activeSession = sessions.reverse().find(s => ['Practice', 'Qualifying', 'Race'].includes(s.session_type));
      
      if (activeSession) {
        const [positions, drivers, laps] = await Promise.all([
          fetchAPI(`/positions?session_key=${activeSession.session_key}`),
          fetchAPI(`/drivers?session_key=${activeSession.session_key}`),
          fetchAPI(`/laps?session_key=${activeSession.session_key}`)
        ]);
        sessionData = { positions, drivers, laps, activeSession, races };
      }
    }
    splash.update('session');
    
    // 4. Drivers & Standings
    splash.update('drivers');
    splash.update('standings');
    
    // Store for app use
    window.DATA = {
      season,
      races,
      ...sessionData,
      ts: Date.now()
    };
    
    splash.hide();
    return sessionData;
    
  } catch (e) {
    console.error('Boot failed:', e);
    splash.hide();
    showNoData();
  }
}

// ═══ UI UTILITIES ═══════════════════════════════════════════════
function formatTime(sec) {
  const s = Math.floor(sec);
  const ms = Math.round((sec - s) * 1000);
  const m = Math.floor(s / 60);
  return m ? `${m}:${String(s % 60).padStart(2, '0')}.${String(ms).padStart(3, '0')}` : `${s}.${String(ms).padStart(3, '0')}`;
}

function formatSector(sec) {
  const s = Math.floor(sec);
  const ms = Math.round((sec - s) * 1000);
  return `${s}.${String(ms).padStart(3, '0')}`;
}

function getTeamColor(team) {
  const colors = {
    'Red Bull': '#1e3050', 'Mercedes': '#00d2be', 'Ferrari': '#dc0000',
    'McLaren': '#ff8700', 'Aston Martin': '#006f62', 'Alpine': '#0082fa',
    'Alfa Romeo': '#900000', 'Haas': '#ffffff', 'AlphaTauri': '#2b4562',
    'Williams': '#0082fa', 'Sauber': '#c41e3a'
  };
  return colors[team] || '#666';
}

function patchText(el, txt) {
  if (el) el.textContent = txt;
}

function setStatus() {
  const indicator = $('liveIndicator');
  const badge = $('badgeText');
  if (window.DATA && Date.now() - window.DATA.ts < 10000) {
    indicator.classList.remove('off');
    badge.textContent = 'LIVE';
  } else {
    indicator.classList.add('off');
    badge.textContent = 'IDLE';
  }
}

function showNoData() {
  patchText($('rname'), 'No Session Found');
  $('lb-race-wrap').innerHTML = `<div class="smsg"><div class="ico">🏎️</div><h3>No data available</h3>
    <p>OpenF1 may not have data yet.<br>Try refreshing in a moment.</p>
    <p style="margin-top:12px"><button onclick="manualRefresh()" style="background:var(--red);color:#fff;border:none;border-radius:6px;padding:8px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;text-transform:uppercase">↻ Retry</button></p></div>`;
  setStatus();
}

function manualRefresh() {
  $('fab').classList.add('spin');
  loadAll().finally(() => $('fab').classList.remove('spin'));
}

async function loadAll() {
  try {
    if (!window.DATA) return;
    
    const { activeSession, positions, drivers, races } = window.DATA;
    if (!activeSession) return;
    
    const newPos = await fetchAPI(`/positions?session_key=${activeSession.session_key}`);
    window.DATA.positions = newPos;
    window.DATA.ts = Date.now();
    
    renderAll();
  } catch (e) {
    console.error('Load failed:', e);
  }
}

function renderAll() {
  if (!window.DATA?.activeSession) return;
  
  const { activeSession, positions, drivers } = window.DATA;
  const type = activeSession.session_type.toLowerCase();
  
  // Race info
  patchText($('rname'), activeSession.session_name || type.toUpperCase());
  patchText($('rdate'), new Date(activeSession.date_start).toLocaleDateString());
  patchText($('rtrack'), activeSession.circuit_short_name || '—');
  
  // Update live status
  setStatus();
  
  // Get distinct drivers in session
  const driverIds = [...new Set(positions.map(p => p.driver_number))];
  const driverMap = Object.fromEntries(drivers.map(d => [d.driver_number, d]));
  
  // Group positions by driver (latest)
  const latestPos = {};
  positions.forEach(p => {
    if (!latestPos[p.driver_number] || p.date > latestPos[p.driver_number].date) {
      latestPos[p.driver_number] = p;
    }
  });
  
  // Sort by position
  const sorted = driverIds.map(dn => ({ driver_number: dn, ...latestPos[dn] }))
    .filter(p => p.position)
    .sort((a, b) => a.position - b.position);
  
  // Render race/quali/practice
  const html = sorted.map(p => {
    const dr = driverMap[p.driver_number] || {};
    const col = getTeamColor(dr.team_name);
    const gap = p.gap_to_leader ? `+${formatTime(p.gap_to_leader)}` : '—';
    
    return `<div class="dcard" style="cursor:pointer" onclick="showDriverDrilldown(${p.driver_number})">
      <div class="posn">${p.position}</div>
      <div class="tcbar" style="background:${col}"></div>
      <div class="dinfo">
        <div class="dname">${dr.full_name || '#' + p.driver_number}</div>
        <div class="dteam">${dr.team_name || '—'}</div>
      </div>
      <div class="dright">
        <span class="gap">${gap}</span>
        <span class="llap">${p.interval || '—'}</span>
      </div>
    </div>`;
  }).join('');
  
  $('lb-race-wrap').innerHTML = html || '<div class="smsg"><div class="ico">🏁</div><h3>No positions yet</h3></div>';
}

function showDriverDrilldown(dn) {
  const { drivers, positions } = window.DATA;
  const dr = drivers.find(d => d.driver_number === dn) || {};
  const col = getTeamColor(dr.team_name);
  const dpos = positions.filter(p => p.driver_number === dn);
  
  const modal = $('drv-modal');
  modal.classList.add('open');
  
  $('drv-card').innerHTML = `
    <div style="background:${col}22;border-bottom:3px solid ${col};padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:${col};text-transform:uppercase">${dr.full_name || '#' + dn}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px">${dr.team_name || '—'}</div>
      </div>
      <button onclick="closeDriverDrilldown()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px">✕</button>
    </div>
    <div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--surface2);border-radius:6px;padding:8px">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Current Pos</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;margin-top:4px;color:${col}">P${dpos[dpos.length-1]?.position || '—'}</div>
      </div>
      <div style="background:var(--surface2);border-radius:6px;padding:8px">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Gap to Leader</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;margin-top:4px">${dpos[dpos.length-1]?.gap_to_leader ? '+' + formatTime(dpos[dpos.length-1].gap_to_leader) : '—'}</div>
      </div>
    </div>
    <div style="height:16px"></div>`;
}

function closeDriverDrilldown() {
  const m = $('drv-modal');
  if (m) m.classList.remove('open');
}

// ═══ CALENDAR ═══════════════════════════════════════════════════
function populateYearSelector() {
  const sel = $('yearSelector');
  const currentYear = new Date().getFullYear();
  const years = [];
  for (let y = currentYear; y >= 2021; y--) years.push(y);
  
  sel.innerHTML = years.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`).join('');
  sel.addEventListener('change', () => loadCalendar());
}

async function loadCalendar() {
  const year = +$('yearSelector').value;
  try {
    const races = await fetchAPI(`/races?year=${year}`);
    const html = races.map(r => `
      <div class="cal-card">
        <div class="cal-date">${new Date(r.date_start).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
        <div class="cal-title">${r.location || r.name}</div>
        <div class="cal-status">${new Date(r.date_start) < new Date() ? 'Done' : 'Upcoming'}</div>
      </div>
    `).join('');
    $('calendar-wrap').innerHTML = html;
  } catch (e) {
    console.error('Calendar load failed:', e);
  }
}

// ═══ TABS & THEME ═════════════════════════════════════════════
function initTabs() {
  $$('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.tab').forEach(b => b.classList.remove('on'));
      $$('.pane').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      $('p-' + btn.dataset.t).classList.add('on');
    });
  });
  
  document.addEventListener('click', e => {
    const btn = e.target.closest('.subtab');
    if (!btn) return;
    const grp = btn.closest('.subtabs'), pane = btn.closest('.pane');
    if (!grp || !pane) return;
    grp.querySelectorAll('.subtab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    pane.querySelectorAll('.subpane').forEach(sp => sp.classList.remove('on'));
    const t = pane.querySelector(`#sp-${btn.dataset.s}`);
    if (t) t.classList.add('on');
  });
}

function applyStoredTheme() {
  const theme = localStorage.getItem('f1_theme') || 'dark';
  document.documentElement.style.colorScheme = theme;
}

// ═══ TIMERS ═══════════════════════════════════════════════════
function setTick(ms) {
  if (ms === _curTick && _tickTimer) return;
  _curTick = ms;
  clearInterval(_tickTimer);
  _tickTimer = setInterval(loadAll, ms);
}

function startTimers() {
  setTick(5000); // Update every 5s when live
}

// ═══ INIT ═════════════════════════════════════════════════════
(async () => {
  await initDB();
  applyStoredTheme();
  populateYearSelector();
  initTabs();
  
  $('stale-bar').addEventListener('click', manualRefresh);
  $('fab').addEventListener('click', manualRefresh);
  
  await bootLoad();
  renderAll();
  loadCalendar();
  startTimers();
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
